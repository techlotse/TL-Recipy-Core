services:
  app:
    image: ${DOCKER_IMAGE:-techlotse/tl-recipe-core:v0.5.5}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://tl_recipe:tl_recipe@db:5432/tl_recipe_core
      DATABASE_STARTUP_RETRIES: ${DATABASE_STARTUP_RETRIES:-30}
      DATABASE_STARTUP_RETRY_MS: ${DATABASE_STARTUP_RETRY_MS:-2000}
      APP_SECRET: ${APP_SECRET:-change-me-use-a-long-random-secret}
      BASIC_AUTH_EMAIL: ${BASIC_AUTH_EMAIL:-admin@example.com}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-change-me}
      BASIC_AUTH_REALM: ${BASIC_AUTH_REALM:-TL Recipe Core}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      SEED_SAMPLE_DATA: ${SEED_SAMPLE_DATA:-true}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tl_recipe_core
      POSTGRES_USER: tl_recipe
      POSTGRES_PASSWORD: tl_recipe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tl_recipe -d tl_recipe_core"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - tl_recipe_db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  tl_recipe_db:
