name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "24 3 * * 1"

jobs:
  build:
    name: Lint, test, build
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: techlotse/tl-recipe-core
      DOCKERHUB_USERNAME: ${{ secrets.ORG_DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.ORG_DOCKERHUB_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application container
        if: github.event_name == 'pull_request'
        run: docker build -t tl-recipe-core:ci .

      - name: Build and publish application container
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:0.1.0
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
